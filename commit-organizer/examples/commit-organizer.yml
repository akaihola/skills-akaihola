version: 1

grouping:
  buckets:
    - name: docs
      paths:
        - docs/**
        - README.md
      defaultType: docs

    - name: source
      paths:
        - src/**
      defaultType: feat
      defaultScope: core

    - name: tests
      paths:
        - tests/**
      defaultType: test

    - name: tooling
      paths:
        - scripts/**
        - .github/**
      defaultType: chore
      defaultScope: ci

keepSeparate:
  - deleted-only-cleanups
  - renames-with-content

# Patterns listed here are used during triage:
# - files matching these globs are flagged as "safe to ignore"
# - tracked files matching them are candidates for git rm --cached
# - new files matching them are candidates for .gitignore additions
ignore:
  - outputs/**
  - tmp/**
  - downloads/**
  - "**/*.log"

naming:
  docs: "docs"
  source: "feat(core)"
  tests: "test"
  tooling: "chore(ci)"
