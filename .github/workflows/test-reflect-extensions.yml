name: Test reflect-extensions

on:
  push:
    branches:
      - main
    paths:
      - "reflect-extensions/**"
      - ".github/workflows/test-reflect-extensions.yml"
  pull_request:
    paths:
      - "reflect-extensions/**"
      - ".github/workflows/test-reflect-extensions.yml"

jobs:
  test:
    name: Run pytest
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
          - "3.13"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v2

      - name: Run tests
        run: uv run --with pytest pytest reflect-extensions/ -q
